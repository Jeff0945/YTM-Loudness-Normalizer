<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTM Loudness Normalizer - Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
<div class="container">
  <h1>YTM Loudness Normalizer</h1>

  <div class="section">
    <label for="targetDb">Target Loudness (dB):</label>
    <div class="input-group">
      <input
              type="range"
              id="targetDb"
              min="-60"
              max="-7"
              value="-14"
              step="0.1"
      />
      <input type="number" id="targetDbNumber" min="-60" max="-7" value="-14" step="0.1" />
    </div>
    <p class="help-text">Default: -14 dB (Industry standard)</p>

    <div style="display: flex">
      <button id="saveBtn" class="save-btn" type="button">Save</button>
    </div>
  </div>

  <div class="section">
    <h3>About</h3>
    <p>
      This extension normalizes audio loudness on YouTube Music to match your preferred
      loudness level. Adjust the target value above to control how loud the audio plays.
    </p>
  </div>

  <div id="status" class="status"></div>
</div>

<script src="options.js" type="module"></script>
</body>
</html>
